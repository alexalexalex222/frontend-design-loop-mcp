name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - name: Compile runtime
        run: |
          python -m py_compile \
            src/frontend_design_loop_mcp/mcp_server.py \
            src/frontend_design_loop_mcp/setup.py \
            src/frontend_design_loop_mcp/runtime_paths.py \
            src/frontend_design_loop_core/config.py \
            src/frontend_design_loop_core/mcp_code_server.py \
            src/frontend_design_loop_core/utils.py
      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest -q --import-mode=importlib

  release-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
      - name: Offline repo verification
        run: |
          PYTHONPATH=src python scripts/preflight_check.py
          PYTHONPATH=src python scripts/smoke_mcp_stdio.py
      - name: Build distribution
        run: |
          python -m build
          python -m twine check dist/*
      - name: Wheel smoke
        shell: bash
        run: |
          set -euo pipefail
          TMP_VENV="$(mktemp -d)"
          python -m venv "$TMP_VENV"
          "$TMP_VENV/bin/pip" install dist/*.whl
          "$TMP_VENV/bin/frontend-design-loop-mcp" --help
          "$TMP_VENV/bin/frontend-design-loop-mcp" --version
          "$TMP_VENV/bin/frontend-design-loop-setup"
          "$TMP_VENV/bin/frontend-design-loop-setup" --check
